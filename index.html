<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Shorts Generator V4</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Roboto+Condensed:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Custom CSS (themes + animations) -->
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Roboto Condensed', sans-serif;
        }

        #preview-wrapper {
            transform-origin: center center;
        }

        .standings-grid {
            display: grid;
            grid-template-columns: 56px minmax(0, 1fr) repeat(7, 52px);
            gap: 8px;
            align-items: center;
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden text-white">

    <!-- ============================
         SIDEBAR
         ============================ -->
    <div id="sidebar-control"
        class="w-[340px] min-w-[340px] h-full bg-gray-800 border-r border-gray-600 flex flex-col overflow-hidden">

        <!-- Header -->
        <div class="p-3 border-b border-gray-600 flex-shrink-0">
            <div class="flex items-center justify-between mb-2">
                <div>
                    <h1 class="font-oswald text-xl text-yellow-400 leading-none">⚡ SportsGen <span
                            class="text-gray-500 text-xs">V4</span></h1>
                    <p class="text-[9px] text-gray-500">Sports Shorts Generator</p>
                </div>
                <div class="flex flex-col items-end gap-1">
                    <div class="flex items-center gap-1">
                        <!-- Lineup Builder -->
                        <button onclick="window.FootballModule.setMode('lineup')" title="🏟️ Lineup Builder"
                            class="bg-blue-600 hover:bg-blue-500 text-white px-2 py-1.5 rounded text-xs transition shadow">
                            <i class="fas fa-users-cog"></i>
                        </button>
                        <!-- Magic Paste -->
                        <button onclick="openMagicPaste()" title="✨ Magic Paste"
                            class="bg-purple-600 hover:bg-purple-500 text-white px-2 py-1.5 rounded text-xs transition shadow">
                            <i class="fas fa-magic"></i>
                        </button>
                        <!-- Share URL -->
                        <button onclick="copyShareUrl(event)" title="📋 Share Link"
                            class="bg-green-700 hover:bg-green-600 text-white px-2 py-1.5 rounded text-xs transition shadow">
                            <i class="fas fa-link"></i>
                        </button>
                        <!-- Export -->
                        <button id="btnExport" title="Export" onclick="startRecording()"
                            class="bg-red-600 hover:bg-red-500 text-white px-2 py-1.5 rounded text-xs transition shadow animate-pulse">
                            <i class="fas fa-video"></i>
                        </button>
                    </div>
                    <!-- Recording Timer -->
                    <div id="recordingTimer"
                        class="hidden text-[11px] font-mono font-bold text-red-500 tracking-widest px-1">00:00</div>
                </div>
            </div>

            <!-- Sport Tabs -->
            <div class="flex bg-gray-900 rounded p-0.5 gap-0.5">
                <button class="sport-tab flex-1 py-1 rounded text-xs font-bold transition text-gray-400"
                    data-sport="football">
                    <i class="fas fa-futbol mr-1"></i>Sepakbola
                </button>
                <button class="sport-tab flex-1 py-1 rounded text-xs font-bold transition text-gray-400"
                    data-sport="volleyball">
                    <i class="fas fa-volleyball-ball mr-1"></i>Voli
                </button>
            </div>
        </div>

        <!-- Scrollable Controls -->
        <div id="dynamic-controls" class="flex-grow overflow-y-auto p-3 custom-scrollbar space-y-0">
            <p class="text-gray-500 text-center py-8 text-sm">Memuat modul...</p>
        </div>
    </div>

    <!-- ============================
         PREVIEW AREA
         ============================ -->
    <div id="main-working-area"
        class="flex-grow h-full bg-gray-950 flex items-center justify-center relative overflow-hidden">

        <!-- Sidebar Toggle -->
        <button onclick="toggleSidebar()" title="Toggle Sidebar"
            class="absolute top-4 left-4 bg-gray-800 text-white p-2.5 rounded-full shadow-lg z-50 hover:bg-gray-700 transition border border-gray-600">
            <i id="icon-sidebar" class="fas fa-chevron-left text-sm"></i>
        </button>

        <!-- Preview Wrapper (zoomed 9:16 canvas) -->
        <div id="preview-wrapper" class="relative shadow-2xl">
            <!-- Actual 1080×1920 canvas -->
            <div id="preview-container" class="w-[1080px] h-[1920px] bg-slate-900 relative overflow-hidden">

                <!-- Background gradient layer -->
                <div id="render-bg" class="absolute inset-0 bg-gradient-to-b from-[#0f2027] via-[#203a43] to-[#2c5364]">
                </div>
                <!-- Background image layer -->
                <div id="render-bg-image" class="absolute inset-0 bg-cover bg-center mix-blend-overlay"
                    style="display:none"></div>

                <!-- Content Layer -->
                <div id="render-content" class="relative z-10 w-full h-full flex flex-col p-[60px]">
                    <!-- Header -->
                    <div id="render-header" class="mb-8 flex items-center justify-center"></div>
                    <!-- Dynamic View -->
                    <div id="render-view" class="flex-grow overflow-hidden"></div>
                    <!-- Footer -->
                    <div id="render-footer"
                        class="mt-auto pt-6 border-t-4 border-yellow-500 h-[160px] flex items-center justify-between">
                        <span class="text-[32px] text-gray-400 font-bold font-oswald">#ShortsGen</span>
                    </div>
                </div>

                <!-- Channel Watermark -->
                <div id="channel-watermark" class="absolute bottom-[180px] right-[60px] z-30 pointer-events-none"
                    style="display:none"></div>
            </div>
        </div>

        <!-- Bottom Controls -->
        <div
            class="absolute bottom-4 right-4 bg-gray-800 rounded-full px-4 py-2 flex gap-3 text-white z-50 shadow-lg border border-gray-600 text-sm">
            <button onclick="adjustZoom(-0.05)" title="Zoom Out"><i class="fas fa-search-minus"></i></button>
            <span id="zoom-level" class="text-xs font-mono self-center">—</span>
            <button onclick="adjustZoom(0.05)" title="Zoom In"><i class="fas fa-search-plus"></i></button>
            <div class="w-px bg-gray-600"></div>
            <button onclick="copyShareUrl(event)" class="text-green-400" title="Share Link"><i
                    class="fas fa-share-alt"></i></button>
        </div>
    </div>

    <!-- ============================
         MAGIC PASTE MODAL
         ============================ -->
    <div id="magic-paste-modal"
        class="hidden fixed inset-0 z-[999] flex items-center justify-center bg-black/75 backdrop-blur-sm">
        <div class="bg-gray-900 rounded-2xl shadow-2xl border border-purple-500/40 w-[620px] max-w-[95vw] p-6">
            <div class="flex justify-between items-center mb-1">
                <h3 class="text-lg font-oswald text-purple-300"><i class="fas fa-magic mr-2"></i>✨ Magic Paste</h3>
                <button onclick="closeMagicPaste()"
                    class="text-gray-400 hover:text-white text-xl leading-none">&times;</button>
            </div>
            <p class="text-[10px] text-gray-400 mb-3">Paste teks jadwal (copy dari Google/Flashscore) <b>ATAU</b> JSON
                langsung. Sistem auto-detect.</p>

            <!-- Template buttons -->
            <div class="flex gap-1 mb-2">
                <span class="text-[9px] text-gray-500 self-center mr-1">Template:</span>
                <button onclick="loadTemplate('standings')"
                    class="text-[9px] bg-gray-700 hover:bg-gray-600 text-gray-200 px-2 py-0.5 rounded">Klasemen</button>
                <button onclick="loadTemplate('schedule')"
                    class="text-[9px] bg-gray-700 hover:bg-gray-600 text-gray-200 px-2 py-0.5 rounded">Jadwal</button>
                <button onclick="loadTemplate('results')"
                    class="text-[9px] bg-gray-700 hover:bg-gray-600 text-gray-200 px-2 py-0.5 rounded">Hasil</button>
                <button onclick="loadTemplate('lineup')"
                    class="text-[9px] bg-gray-700 hover:bg-gray-600 text-gray-200 px-2 py-0.5 rounded">Lineup</button>
            </div>

            <textarea id="magic-paste-input" rows="12"
                class="w-full bg-gray-800 text-white text-[10px] rounded-lg border border-gray-600 p-3 font-mono resize-none focus:outline-none focus:border-purple-500"
                placeholder="Paste JSON atau teks di sini..."></textarea>

            <div class="flex gap-2 mt-4 justify-end">
                <button onclick="closeMagicPaste()"
                    class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white text-sm rounded-lg">Batal</button>
                <button onclick="applyMagicPaste()"
                    class="px-4 py-2 bg-purple-600 hover:bg-purple-500 text-white text-sm rounded-lg font-bold">
                    <i class="fas fa-bolt mr-1"></i> Apply!
                </button>
            </div>
        </div>
    </div>

    <!-- ============================
         SCRIPTS
         ============================ -->
    <script type="module" src="js/core/app.js"></script>
    <script>
        // ---- Zoom / Fit ----
        let currentScale = 0.33;
        const wrapper = document.getElementById('preview-wrapper');

        function adjustZoom(delta) {
            currentScale = Math.max(0.1, Math.min(1.2, currentScale + delta));
            applyZoom();
        }
        function applyZoom() {
            wrapper.style.transform = `scale(${currentScale})`;
            document.getElementById('zoom-level').textContent = `${Math.round(currentScale * 100)}%`;
        }
        function autoFit() {
            const area = document.getElementById('main-working-area');
            const scaleW = (area.clientWidth - 60) / 1080;
            const scaleH = (area.clientHeight - 60) / 1920;
            currentScale = Math.min(scaleW, scaleH);
            applyZoom();
        }

        // ---- Sidebar Toggle ----
        function toggleSidebar() {
            const sb = document.getElementById('sidebar-control');
            const icon = document.getElementById('icon-sidebar');
            sb.classList.toggle('hidden');
            icon.classList.toggle('fa-chevron-left');
            icon.classList.toggle('fa-chevron-right');
            setTimeout(autoFit, 350);
        }

        // ---- Share URL ----
        function copyShareUrl(event) {
            navigator.clipboard.writeText(location.href).then(() => {
                const btn = event?.currentTarget;
                if (btn) {
                    const orig = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check"></i>';
                    setTimeout(() => btn.innerHTML = orig, 1800);
                }
            }).catch(() => alert('Link: ' + location.href));
        }

        // ---- Magic Paste ----
        function openMagicPaste() {
            document.getElementById('magic-paste-modal').classList.remove('hidden');
            document.getElementById('magic-paste-input').focus();
        }
        function closeMagicPaste() {
            document.getElementById('magic-paste-modal').classList.add('hidden');
        }
        async function applyMagicPaste() {
            const input = document.getElementById('magic-paste-input').value;
            const mod = window.CurrentSportModule;
            if (mod?.applyMagicPaste) {
                await mod.applyMagicPaste(input);
            } else {
                window.dispatchEvent(new CustomEvent('magic-paste', { detail: { input } }));
            }
            closeMagicPaste();
        }
        function loadTemplate(mode) {
            if (window.CurrentSportModule && window.CurrentSportModule.TEMPLATES) {
                document.getElementById('magic-paste-input').value = window.CurrentSportModule.TEMPLATES[mode] || '';
                return;
            }
            // Football default fallback
            const templates = {
                standings: `{"sport":"football","mode":"standings","title":"BRI SUPER LEAGUE","standings":[{"pos":1,"name":"Persib","mp":20,"w":14,"d":4,"l":2,"gf":42,"ga":18,"gd":24,"pts":46},{"pos":2,"name":"Persija","mp":20,"w":13,"d":3,"l":4,"gf":38,"ga":22,"gd":16,"pts":42},{"pos":3,"name":"Bali United","mp":20,"w":11,"d":5,"l":4,"gf":35,"ga":25,"gd":10,"pts":38}]}`,
                schedule: `{"sport":"football","mode":"schedule","title":"BRI SUPER LEAGUE","matches":[{"date":"Sabtu, 22 Feb 2026","time":"19:00","home":"Persija","away":"Persib","venue":"GBK","channel":"Indosiar"},{"date":"Sabtu, 22 Feb 2026","time":"15:30","home":"Arema","away":"Bhayangkara","venue":"Kanjuruhan","channel":"RCTI"}]}`,
                results: `{"sport":"football","mode":"results","title":"Hasil Pekan 20","matches":[{"date":"Sab 15 Feb","home":"Persib","away":"Persija","homeScore":2,"awayScore":1},{"date":"Sab 15 Feb","home":"Arema","away":"PSM","homeScore":0,"awayScore":2}]}`,
                lineup: `{"sport":"football","mode":"lineup","title":"STARTING XI","matches":[{"date":"Senin, 24 Feb 2026","time":"19:00","venue":"Stadion Utama GBK","home":"Persib","away":"Persija","homeLineup":[{"name":"Kevin","no":1,"pos":"GK"}, {"name":"Henhen","no":12,"pos":"RB"}, {"name":"Kuipers","no":2,"pos":"CB"}, {"name":"Gustavo","no":4,"pos":"CB"}, {"name":"Rezaldi","no":56,"pos":"LB"},{"name":"Klok","no":23,"pos":"CM"}, {"name":"Dedi K","no":11,"pos":"CDM"}, {"name":"Irianto","no":53,"pos":"CM"},{"name":"Ciro","no":77,"pos":"RW"}, {"name":"David","no":19,"pos":"ST"}, {"name":"Beckham","no":7,"pos":"LW"}],"awayLineup":[{"name":"Andritany","no":26,"pos":"GK"}, {"name":"Rio F","no":2,"pos":"RB"}, {"name":"Kudela","no":17,"pos":"CB"}, {"name":"Rizky R","no":74,"pos":"CB"}, {"name":"Firza","no":11,"pos":"LB"},{"name":"Gajos","no":10,"pos":"CM"}, {"name":"Hanif","no":19,"pos":"CDM"}, {"name":"Maciej","no":8,"pos":"CM"},{"name":"Ryo","no":7,"pos":"RW"}, {"name":"Gustavo","no":70,"pos":"ST"}, {"name":"Simic","no":9,"pos":"LW"}]}]}`
            };
            document.getElementById('magic-paste-input').value = JSON.stringify(JSON.parse(templates[mode]), null, 2);
        }

        // Keyboard shortcut: Escape closes modal
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeMagicPaste();
        });

        window.openMagicPaste = openMagicPaste;
        window.addEventListener('resize', autoFit);
        window.addEventListener('DOMContentLoaded', autoFit);

        // ---- Recording Logic (Ported from V3) ----
        let isRecording = false;
        let mediaRecorder = null;
        let videoStream = null;
        let recordingInterval = null;
        let recordingStartTime = 0;

        function updateTimer() {
            if (!isRecording) return;
            const now = Date.now();
            const diff = Math.floor((now - recordingStartTime) / 1000);
            const m = String(Math.floor(diff / 60)).padStart(2, '0');
            const s = String(diff % 60).padStart(2, '0');
            document.getElementById('recordingTimer').textContent = `${m}:${s}`;
        }

        async function startRecording() {
            if (isRecording && mediaRecorder) {
                // Stop recording if already active
                mediaRecorder.stop();
                return;
            }

            const previewContainer = document.getElementById('preview-container');
            const btnIcon = document.querySelector('#btnExport i');
            const btn = document.getElementById('btnExport');

            document.body.classList.add('is-recording');
            await new Promise(r => setTimeout(r, 300));
            try {
                videoStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { displaySurface: "browser", preferCurrentTab: true },
                    audio: false, selfBrowserSurface: "include", systemAudio: "exclude", surfaceSwitching: "include", monitorTypeSurfaces: "exclude"
                });

                const [track] = videoStream.getVideoTracks();

                if (typeof CropTarget !== 'undefined' && track.cropTo) {
                    try { const cropTarget = await CropTarget.fromElement(previewContainer); await track.cropTo(cropTarget); } catch (err) { }
                }

                // Standard WebM/VP9 which is robust (Reverted to V3 settings)
                const mimeType = "video/webm;codecs=vp9";
                console.log("Recording using MIME type:", mimeType);

                mediaRecorder = new MediaRecorder(videoStream, { mimeType });
                const chunks = [];

                // Trigger animations to re-run for recording
                if (window.CurrentSportModule && window.CurrentSportModule.renderView) {
                    window.CurrentSportModule.renderView();
                }

                if (btnIcon) {
                    btnIcon.classList.remove('fa-video');
                    btnIcon.classList.add('fa-stop');
                    btn.classList.replace('bg-red-600', 'bg-yellow-500');
                    btn.classList.add('animate-none');
                }

                isRecording = true;
                recordingStartTime = Date.now();
                document.getElementById('recordingTimer').textContent = "00:00";
                document.getElementById('recordingTimer').classList.remove('hidden');
                recordingInterval = setInterval(updateTimer, 1000);

                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) chunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: mimeType });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;

                    const ext = "webm";
                    const viewName = window.CurrentSportModule?.data?.currentView || 'export';
                    a.download = `sportsgen_v4_${viewName}_${new Date().getTime()}.${ext}`;

                    document.body.appendChild(a);
                    a.click();

                    setTimeout(() => {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    }, 100);

                    resetRecordingState();
                };

                mediaRecorder.start(1000);
                track.onended = () => { if (mediaRecorder.state !== 'inactive') mediaRecorder.stop(); };

            } catch (err) {
                console.error(err);
                if (err.name !== 'NotAllowedError') alert("Gagal merekam: " + err);
                resetRecordingState();
            }
        }

        function resetRecordingState() {
            isRecording = false;
            if (recordingInterval) { clearInterval(recordingInterval); recordingInterval = null; }
            const timerEl = document.getElementById('recordingTimer');
            if (timerEl) {
                timerEl.classList.add('hidden');
                timerEl.textContent = "00:00";
            }

            document.body.classList.remove('is-recording');
            const btnIcon = document.querySelector('#btnExport i');
            const btn = document.getElementById('btnExport');
            if (btnIcon) {
                btnIcon.classList.add('fa-video');
                btnIcon.classList.remove('fa-stop');
                btn.classList.replace('bg-yellow-500', 'bg-red-600');
                btn.classList.remove('animate-none');
            }
            if (videoStream) {
                videoStream.getTracks().forEach(t => t.stop());
                videoStream = null;
            }
            mediaRecorder = null;
        }

        window.startRecording = startRecording;
    </script>
</body>

</html>
